image: debian:bullseye-slim

build:
  artifacts:
    paths:
      - output.log
      - repo
  script:
    - apt-get update
    - apt-get upgrade --yes
    - apt-get dist-upgrade --yes
    - apt-get --no-install-recommends -y install fakechroot fakeroot devscripts mmdebstrap python3 reprepro sbuild schroot debhelper debian-keyring quilt pristine-tar rsync
    - test -d /srv/chroot/unstable-sbuild || sbuild-createchroot --debootstrap=mmdebstrap --alias=sid unstable /srv/chroot/unstable-sbuild http://deb.debian.org/debian
    - id build >/dev/null || adduser --gecos build --disabled-password build
    - id build >/dev/null || adduser build sbuild
    - sed -i '/union-overlay-directory=/d' /etc/schroot/chroot.d/unstable-$(dpkg --print-architecture)-sbuild-*
    - echo union-overlay-directory=$(pwd) >> /etc/schroot/chroot.d/unstable-$(dpkg --print-architecture)-sbuild-*
    - chown build -R .
    - runuser build -c ./build.sh 2>&1 | ./filter-output
