image: debian:bookworm-slim

variables:
  BASESUITE:
    description: Debian suite to fetch packages from
    value: unstable
  OURSUITE:
    description: Suite name of the repository we create
    value: reform
  REFORM_TOOLS_BRANCH:
    description: The git branch name from which reform-tools should be built
    value: main

stages:
  - setup
  - build
  - reprepro

.setup:
  before_script: |
    set -x
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install devscripts reprepro sbuild debhelper debian-keyring quilt pristine-tar rsync git python3-debian faketime python3-jinja2 uidmap debian-archive-keyring curl
    if [ ! -e /proc/sys/fs/binfmt_misc/status ]; then
      mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
    fi
    apt-get --no-install-recommends -y install arch-test binfmt-support qemu-user-static
    arch-test arm64
    adduser --comment build --disabled-password build
    runuser -u build -- sh -c 'echo "\$chroot_mode = \"unshare\";1;" > ~/.sbuildrc'
    runuser -u build -- sh -c 'mkdir -p changes buildlogs ~/.cache/sbuild'
    if [ "$BASESUITE" = "experimental" ]; then
      runuser -u build -- sh -c 'ln -s unstable-amd64.tar ~/.cache/sbuild/experimental-amd64.tar'
      BASESUITE=unstable
    fi
    runuser -u build -- sh -c "cp chroot-amd64.tar ~/.cache/sbuild/$BASESUITE-amd64.tar"
    #runuser -u build -- sh -c "cp chroot-arm64.tar ~/.cache/sbuild/$BASESUITE-arm64.tar"
    chown build -R .

setup:
  stage: setup
  artifacts:
    paths:
      - chroot-amd64.tar
      #- chroot-arm64.tar
      - repo
      - chdist
  script: |
    set -x
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install reprepro python3 devscripts mmdebstrap uidmap
    if [ ! -e /proc/sys/fs/binfmt_misc/status ]; then
      mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
    fi
    apt-get --no-install-recommends -y install arch-test binfmt-support qemu-user-static
    arch-test arm64
    adduser --comment build --disabled-password build
    chown build -R .
    rm -rvf changes buildlogs chdist repo chroot-amd64.tar chroot-arm64.tar
    if [ "$BASESUITE" = "experimental" ]; then
      BASESUITE=unstable
    fi
    #  --chrooted-customize-hook='dpkg --add-architecture arm64' \
    #  --chrooted-customize-hook='apt-get update' \
    #  --chrooted-customize-hook='set -ex; for a in amd64 arm64; do for p in gobject-introspection-bin libgirepository-1.0-dev gir1.2-freedesktop-dev gir1.2-girepository-2.0 gir1.2-girepository-2.0-dev gir1.2-glib-2.0-dev gir1.2-glib-2.0 gir1.2-freedesktop libgirepository-1.0-1 gobject-introspection libgirepository1.0-dev; do wget http://deb.debian.org/debian/pool/main/g/gobject-introspection/${p}_1.78.1-9_${a}.deb; done; done' \
    #  --chrooted-customize-hook='rm /libgirepository1.0-dev_1.78.1-9_amd64.deb /gobject-introspection-bin_1.78.1-9_arm64.deb' \
    #  --chrooted-customize-hook='apt-get install --yes /*.deb' \
    #  --chrooted-customize-hook='rm /*.deb' \
    runuser -u build -- mmdebstrap --architecture=amd64 --variant=buildd --include=wget,crossbuild-essential-arm64 --mode=unshare \
      --chrooted-customize-hook='rm /usr/bin/ischroot && ln -s /bin/true /usr/bin/ischroot' \
      $BASESUITE chroot-amd64.tar
    #runuser -u build -- mmdebstrap --architecture=arm64 --variant=buildd --mode=unshare $BASESUITE chroot-arm64.tar
    runuser -u build -- sh -x ./setup.sh

build_patched:
  stage: build
  #when: manual
  extends: .setup
  dependencies:
    - setup
  artifacts:
    when: always
    paths:
      - output.log
      - changes
      - buildlogs
  script: |
    runuser -u build -- sh -x ./build_patched.sh 2>&1 | ./filter-output

build_custom:
  stage: build
  #when: manual
  extends: .setup
  dependencies:
    - setup
  artifacts:
    when: always
    paths:
      - output.log
      - changes
      - buildlogs
  script: |
    runuser -u build -- sh -x ./build_custom.sh 2>&1 | ./filter-output
    echo "BASESUITE: $BASESUITE"
    echo "OURSUITE: $OURSUITE"
    echo "REFORM_TOOLS_BRANCH: $REFORM_TOOLS_BRANCH"

build_linux:
  stage: build
  #when: manual
  extends: .setup
  dependencies:
    - setup
  artifacts:
    when: always
    paths:
      - output.log
      - changes
      - linux/linux_*_arm64-*.build
  script: |
    runuser -u build -- sh -xc '. ./common.sh; cd linux; . ./build.sh' 2>&1 | ./filter-output
    dpkg-deb -c changes/linux-image-*-reform2-arm64_*_arm64.deb | grep 'kernel/drivers/gpu/drm/imx\(/cdns\)\?/cdns_mhdp_imx.ko'

reprepro:
  stage: reprepro
  dependencies:
    - setup
    - build_patched
    - build_custom
    - build_linux
  artifacts:
    when: always
    paths:
      - repo
  script: |
    set -x
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install reprepro python3 devscripts
    adduser --comment build --disabled-password build
    runuser -u build -- sh -x ./reprepro.sh
    echo "BASESUITE: $BASESUITE"
    echo "OURSUITE: $OURSUITE"
    echo "REFORM_TOOLS_BRANCH: $REFORM_TOOLS_BRANCH"
