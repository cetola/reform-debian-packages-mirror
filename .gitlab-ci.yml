image: debian:bullseye-slim

build:
  script:
    - apt-get update
    - apt-get upgrade --yes
    - apt-get dist-upgrade --yes
    - apt-get --no-install-recommends -y install fakechroot fakeroot devscripts mmdebstrap python3 reprepro sbuild schroot debhelper debian-keyring
    - sbuild-createchroot --debootstrap=mmdebstrap --alias=sid unstable /srv/chroot/unstable-sbuild http://deb.debian.org/debian
    - adduser --gecos build --disabled-password build
    - adduser build sbuild
    - chown build -R .
    - runuser build -c ./build.sh
