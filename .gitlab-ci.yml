spec:
  inputs:
    basesuite:
      description: "Debian suite to fetch packages from"
      default: unstable
      options:
        - unstable
        - experimental
    oursuite:
      description: "Suite name of the repository we create"
      default: reform
    mirror:
      description: "Debian mirror to pull packages from"
      default: "http://deb.debian.org/debian"
---

image: debian:unstable-slim

stages:
  - build
  - reprepro

.setup:
  before_script: |
    set -x
    BASESUITE='$[[ inputs.basesuite ]]'
    export BASESUITE
    OURSUITE='$[[ inputs.oursuite ]]'
    export OURSUITE
    MIRROR='$[[ inputs.mirror ]]'
    export MIRROR
    # Do not allow custom builds in the 'reform' namespace as those can
    # potentially taint the repository at https://mntre.com/reform-debian-repo/
    if [ "$CI_SERVER_HOST" = "source.mnt.re" ] && [ "$CI_PROJECT_NAMESPACE" = "reform" ]; then
      if [ "$[[ inputs.basesuite ]]" != "unstable" ]; then
        echo "Refusing to run pipeline in the 'reform' namespace with BASESUITE not set to 'unstable'" >&2
        echo "to avoid accidentally tainting the repository at https://mntre.com/reform-debian-repo." >&2
        echo "Consider running custom pipelines in a fork of reform-debian-packages under your own username instead." >&2
        exit 1
      fi
      if [ "$[[ inputs.oursuite ]]" != "reform" ]; then
        echo "Refusing to run pipeline on the 'reform' namespace with OURSUITE not set to 'reform'" >&2
        echo "to avoid accidentally tainting the repository at https://mntre.com/reform-debian-repo." >&2
        echo "Consider running custom pipelines in a fork of reform-debian-packages under your own username instead." >&2
        exit 1
      fi
    fi
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install python3 devscripts reprepro sbuild mmdebstrap uidmap mount debhelper debian-keyring quilt pristine-tar rsync git python3-debian faketime python3-jinja2 python3-dacite debian-archive-keyring curl kernel-wedge unzip build-essential dh-python iproute2 arch-test cpio
    useradd --comment build --home-dir /home/build --create-home build
    chown build -R .
    rm -rvf changes buildlogs chdist repo chroot-*.tar
    runuser -u build -- sh -x ./setup.sh
    runuser -u build -- sed -i 's/^Architectures: .*/Architectures: source arm64 armhf i386 amd64/' ./repo/conf/distributions
    runuser -u build -- reprepro --basedir ./repo export
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    runuser -u build -- sh -c 'mkdir -p ~/.config/sbuild'
    runuser -u build -- sh -c 'echo "\$chroot_mode = \"unshare\";\$unshare_mmdebstrap_keep_tarball=1;\$chroot_aliases->{reform} = \"unstable\";push @{\$unshare_mmdebstrap_distro_mangle}, qr/^reform\$/, \"unstable\";1;" > ~/.config/sbuild/config.pl'
    runuser -u build -- sh -c 'mkdir -p changes buildlogs'
    chown build -R .

