build_custom:
  stage: build
  variables:
    BUILD_ARCH: arm64
    HOST_ARCH: arm64
  #when: manual
  extends: .setup
  tags:
    - arm64
  artifacts:
    when: always
    paths:
      - output.log
      - changes-custom
      - buildlogs
      - fonts-reform-iosevka-term_2.3.0.1.dsc
      - fonts-reform-iosevka-term_2.3.0.1.tar.xz
      - fonts-reform-iosevka-term_2.3.0.1_arm64.buildinfo
      - fonts-reform-iosevka-term_2.3.0.1_arm64.changes
      - fonts-reform-iosevka-term_2.3.0.1_arm64.deb
  script: |
    set -exuo pipefail
    BASESUITE='$[[ inputs.basesuite ]]'
    export BASESUITE
    OURSUITE='$[[ inputs.oursuite ]]'
    export OURSUITE
    MIRROR='$[[ inputs.mirror ]]'
    export MIRROR
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --yes install --no-install-recommends equivs
    runuser -u build -- sh -x ./build_custom.sh 2>&1 | ./filter-output
    mv changes changes-custom
  after_script: |
    echo "BASESUITE: $[[ inputs.basesuite ]]"
    echo "OURSUITE: $[[ inputs.oursuite ]]"

.build_linux:
  stage: build
  #when: manual
  extends: .setup
  script: |
    set -x
    BASESUITE='$[[ inputs.basesuite ]]'
    export BASESUITE
    OURSUITE='$[[ inputs.oursuite ]]'
    export OURSUITE
    MIRROR='$[[ inputs.mirror ]]'
    export MIRROR
    echo "MIRROR: $[[ inputs.mirror ]]" >&2
    # gitlab has pipefail turned on by default, so the below will fail if
    # build.sh fails despite the command being piped to filter-output.
    runuser -u build -- sh -xc '. ./common.sh; cd linux; . ./build.sh' 2>&1 | ./filter-output
    # move to arch-qualified path
    mv changes "changes-$HOST_ARCH"
    # kernel specific checks only on arm64
    if [ "$HOST_ARCH" != "arm64" ]; then
      exit 0
    fi
    for module in 'kernel/drivers/gpu/drm/imx\(/cdns\)\?/cdns_mhdp_imx.ko' \
                  'kernel/drivers/gpu/drm/bridge/cadence/cdns-mhdp8546.ko' \
                  'kernel/drivers/net/mdio/mdio-mux-meson-g12a.ko'; do
      # since kernel 6.19, modules are in the linux-modules-* package
      found=0
      for p in "changes-$HOST_ARCH"/linux-image-*-mnt-reform-arm64_*_arm64.deb \
               "changes-$HOST_ARCH"/linux-modules-*-mnt-reform-arm64_*_arm64.deb; do
        [ -e "$p" ] || continue
        if dpkg-deb -c "$p" | grep "$module"; then
          found=1
          break
        fi
      done
      if [ "$found" -eq 0 ]; then
        echo "$module missing" >&2
        exit 1
      else
        echo "$module found" >&2
      fi
    done
    for dtb in amlogic/meson-g12b-bananapi-cm4-mnt-pocket-reform.dtb freescale/imx8mp-mnt-pocket-reform.dtb freescale/imx8mq-mnt-reform2.dtb freescale/imx8mq-mnt-reform2-hdmi.dtb amlogic/meson-g12b-bananapi-cm4-mnt-reform2.dtb freescale/imx8mp-mnt-reform2.dtb freescale/fsl-ls1028a-mnt-reform2.dtb rockchip/rk3588-mnt-reform2.dtb; do
      # since kernel 6.19, dtbs are in the linux-base-* package
      found=0
      for p in "changes-$HOST_ARCH"/linux-image-*-mnt-reform-arm64_*_arm64.deb \
               "changes-$HOST_ARCH"/linux-base-*-mnt-reform-arm64_*_arm64.deb; do
        [ -e "$p" ] || continue
        if dpkg-deb -c "$p" | grep "/${dtb}\$"; then
          found=1
          break
        fi
      done
      if [ "$found" -eq 0 ]; then
        echo "$dtb missing" >&2
        exit 1
      else
        echo "$dtb found" >&2
      fi
    done
    for f in "changes-$HOST_ARCH"/linux-image-arm64_*_arm64.deb "changes-$HOST_ARCH"/linux-headers-arm64_*_arm64.deb; do
      if [ ! -e "$f" ]; then
        echo "$f does not exist" >&2
        exit 1
      fi
    done

  after_script: |
    if [ $CI_JOB_STATUS != 'success' ]; then
      # The linux log is ~100 MB large so much too big to be stored by gitlab
      # as the job log. To avoid having to manually browse the artifacts and
      # download the log, grep for common error indicators in the log and
      # display the result here.
      grep -B1 -A3 --color -P '([^"]error:|Error|[^_W]ERROR|Waiting for unfinished jobs)' linux/linux_*_"${HOST_ARCH}"-*.build
      exit 1
    fi
    echo "BASESUITE: $[[ inputs.basesuite ]]"
    echo "OURSUITE: $[[ inputs.oursuite ]]"

build_linux_arm64:
  variables:
    BUILD_ARCH: arm64
    HOST_ARCH: arm64
  extends: .build_linux
  tags:
    - arm64
  artifacts:
    when: always
    paths:
      - output.log
      - changes-arm64
      - linux/linux_*_arm64-*.build

build_linux_armhf:
  rules:
    - when: never
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_NAME == "main"
