image: debian:bookworm-slim

stages:
  - setup
  - build
  - reprepro

.setup:
  before_script: |
    set -x
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install devscripts reprepro sbuild debhelper debian-keyring quilt pristine-tar rsync git python3-debian faketime python3-jinja2 uidmap debian-archive-keyring curl
    if [ ! -e /proc/sys/fs/binfmt_misc/status ]; then
      mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
    fi
    apt-get --no-install-recommends -y install arch-test binfmt-support qemu-user-static
    arch-test arm64
    adduser --gecos build --disabled-password build
    runuser -u build -- sh -c 'echo "\$chroot_mode = \"unshare\";" > ~/.sbuildrc'
    runuser -u build -- sh -c 'mkdir -p changes ~/.cache/sbuild'
    runuser -u build -- sh -c 'cp unstable-amd64.tar unstable-arm64.tar ~/.cache/sbuild'
    runuser -u build -- sh -c 'ln -s unstable-amd64.tar ~/.cache/sbuild/experimental-amd64.tar'
    chown build -R .

setup:
  stage: setup
  artifacts:
    paths:
      - unstable-amd64.tar
      - unstable-arm64.tar
      - repo
      - chdist
  script: |
    set -x
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install reprepro python3 devscripts mmdebstrap uidmap
    if [ ! -e /proc/sys/fs/binfmt_misc/status ]; then
      mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
    fi
    apt-get --no-install-recommends -y install arch-test binfmt-support qemu-user-static
    arch-test arm64
    adduser --gecos build --disabled-password build
    chown build -R .
    rm -rvf changes chdist repo unstable-amd64.tar unstable-arm64.tar
    runuser -u build -- mmdebstrap --architecture=amd64 --mode=unshare unstable unstable-amd64.tar
    runuser -u build -- mmdebstrap --architecture=arm64 --mode=unshare unstable unstable-arm64.tar
    runuser -u build -- sh -x ./setup.sh

build_patched:
  stage: build
  #when: manual
  extends: .setup
  dependencies:
    - setup
  artifacts:
    when: always
    paths:
      - output.log
      - changes
  script: |
    # if we are on gitlab CI and if the current branch is NOT main, then
    # fill the repo with cached results from the last successful run in main
    for p in patches/*; do
      p=${p#patches/}
      [ -e "patches/$p" ] || continue
      [ -x "patches/$p" ] || continue
      if [ -n "${CI_COMMIT_REF_NAME+x}" ] && [ "${CI_COMMIT_REF_NAME:-}" != main ]; then
        for variant in cross native; do
          if [ "$(curl --silent --output /dev/null --write-out "%{http_code}" --location "$CI_PROJECT_URL/-/jobs/artifacts/main/raw/changes/${p}_${variant}.changes?job=build_patched")" != "200" ]; then
            echo "${p}_${variant}.changes is not available" >&2
            continue
          fi
          curl --silent --location "$CI_PROJECT_URL/-/jobs/artifacts/main/raw/changes/${p}_${variant}.changes?job=build_patched" > "changes/${p}_${variant}.changes"
          env --chdir=changes dcmd "${p}_${variant}.changes" | while read f; do
            echo "downloading $f" >&2
            curl --silent --location "$CI_PROJECT_URL/-/jobs/artifacts/main/raw/changes/${f}?job=build_patched" > "changes/${f}"
          done
          echo "including ${p}_${variant}.changes" >&2
          reprepro --basedir ./repo include "reform" "changes/${p}_${variant}.changes"
        done
      fi
    done
    runuser -u build -- sh -x ./build_patched.sh 2>&1 | ./filter-output

build_custom:
  stage: build
  #when: manual
  extends: .setup
  dependencies:
    - setup
  artifacts:
    when: always
    paths:
      - output.log
      - changes
  script: |
    runuser -u build -- sh -x ./build_custom.sh 2>&1 | ./filter-output

build_linux:
  stage: build
  #when: manual
  extends: .setup
  dependencies:
    - setup
  artifacts:
    when: always
    paths:
      - output.log
      - changes
      - linux/linux_*_arm64-*.build
  script: |
    runuser -u build -- sh -xc '. ./common.sh; cd linux; export BASESUITE=unstable; . ./build.sh' 2>&1 | ./filter-output
    dpkg-deb -c changes/linux-image-*-reform2-arm64_*_arm64.deb | grep kernel/drivers/gpu/drm/imx/cdns/cdns_mhdp_imx.ko

reprepro:
  stage: reprepro
  dependencies:
    - setup
    - build_patched
    - build_custom
    - build_linux
  artifacts:
    when: always
    paths:
      - repo
  script: |
    set -x
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install reprepro python3 devscripts
    adduser --gecos build --disabled-password build
    runuser -u build -- sh -x ./reprepro.sh
