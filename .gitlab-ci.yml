dtbs_check:
  stage: build
  tags:
    - arm64
  needs:
    - job: build_linux_arm64
      artifacts: true
  script: |
    set -exuo pipefail
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --yes install --no-install-recommends gcc-aarch64-linux-gnu build-essential bison flex device-tree-compiler git ca-certificates xz-utils libssl-dev bc dt-schema
    dpkg -x ./changes-arm64/linux-source-*.deb ./
    dpkg -x ./changes-arm64/linux-config-*.deb ./
    tar xfJ usr/src/linux-source-*.tar.xz
    cd linux-source-*
    xz --decompress --to-stdout ../usr/src/linux-config-*/config.arm64_none_*arm64.xz > .config
    for dtb in \
      amlogic/meson-g12b-bananapi-cm4-mnt-pocket-reform.dtb \
      freescale/imx8mp-mnt-pocket-reform.dtb \
      freescale/imx8mq-mnt-reform2.dtb \
      freescale/imx8mq-mnt-reform2-hdmi.dtb \
      amlogic/meson-g12b-bananapi-cm4-mnt-reform2.dtb \
      freescale/imx8mp-mnt-reform2.dtb \
      freescale/fsl-ls1028a-mnt-reform2.dtb \
      rockchip/rk3588-mnt-reform2.dtb; do
      set +x
      echo =================================================================
      echo "    $dtb"
      echo =================================================================
      set -x
      make CHECK_DTBS=y "$dtb"
    done

build_qcacld:
  stage: build
  extends: .setup
  tags:
    - arm64
  needs:
    - job: build_linux_arm64
      artifacts: true
  script: |
    set -exuo pipefail
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --yes install --no-install-recommends gcc-aarch64-linux-gnu build-essential bison flex device-tree-compiler git ca-certificates xz-utils libssl-dev bc sbuild

    if [ -z ${SOURCE_DATE_EPOCH:+x} ] && git -C . rev-parse 2>/dev/null; then
      SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
    else
      : "${SOURCE_DATE_EPOCH:=$(date --utc +%s)}"
    fi
    export SOURCE_DATE_EPOCH

    KERNEL_ABINAME=$(dpkg-deb --field changes-arm64/linux-image-*-mnt-reform-arm64_*_arm64.deb Package)
    KERNEL_ABINAME=${KERNEL_ABINAME##linux-image-}

    git clone --depth=1 --branch=binary-deb https://source.mnt.re/reform/qcacld2.git

    env --chdir=qcacld2 ./createdeb.sh "$KERNEL_ABINAME" "$(pwd)"/changes-arm64/linux-source-*.deb

    chown build -R .
    runuser -u build -- env --chdir=qcacld2 sbuild --verbose --no-run-lintian --no-run-autopkgtest --extra-package "$(pwd)"/changes-arm64/linux-source-*.deb --extra-package "$(pwd)"/changes-arm64/linux-config-*.deb --no-clean-source
  artifacts:
    when: always
    paths:
      - "reform-qcacld2*.deb"
      - "*.buildinfo"
      - "*.changes"

reprepro:
  stage: reprepro
  extends: .setup
  tags:
    - arm64
  dependencies:
    - build_patched_arm64
    - build_patched_armhf
    - build_patched_amd64
    - build_patched_i386
    - build_custom
    - build_linux_arm64
    - build_linux_armhf
    - build_linux_amd64
    - build_linux_i386
    - build_qcacld
  artifacts:
    when: always
    paths:
      - repo
      - variables.sh
  script: |
    set -x
    BASESUITE='$[[ inputs.basesuite ]]'
    export BASESUITE
    OURSUITE='$[[ inputs.oursuite ]]'
    export OURSUITE
    MIRROR='$[[ inputs.mirror ]]'
    export MIRROR
    apt-get update -o Acquire::AllowReleaseInfoChange=true -o quiet::ReleaseInfoChange=true
    apt-get --no-install-recommends -y install reprepro python3 devscripts
    runuser -u build -- sh -x ./reprepro.sh
    {
      echo "CI_PROJECT_NAMESPACE=\"$CI_PROJECT_NAMESPACE\"";
      echo "CI_COMMIT_BRANCH=\"$CI_COMMIT_BRANCH\"";
      echo "CI_COMMIT_REF_NAME=\"$CI_COMMIT_REF_NAME\"";
      echo "BASESUITE=\"$[[ inputs.basesuite ]]\"";
      echo "OURSUITE=\"$[[ inputs.oursuite ]]\"";
    } | tee variables.sh
  after_script: |
    echo "To use the artifacts of this job as an apt source, add this to your /etc/apt/sources.list:" >&2
    echo "deb [trusted=yes arch=arm64] https://$CI_SERVER_HOST/$CI_PROJECT_NAMESPACE/reform-debian-packages/-/jobs/$CI_JOB_ID/artifacts/raw/repo $[[ inputs.oursuite ]] main"
